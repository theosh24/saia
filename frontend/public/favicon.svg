<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="s-grad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#c44dff"/>
      <stop offset="40%" stop-color="#00bfff"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#08081a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <circle cx="32" cy="32" r="32" fill="#08081a"/>

  <!-- Subtle inner glow -->
  <circle cx="32" cy="32" r="26" fill="url(#bg-glow)"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#00e5ff" stroke-width="0.6" opacity="0.5"/>

  <!-- Dashed inner ring -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#00e5ff" stroke-width="0.4" opacity="0.25" stroke-dasharray="2 2"/>

  <!-- Stylized S shape with rounded thick stroke -->
  <path d="M39 17 L26 17 C21 17 18 20.5 18 24.5 C18 28.5 21 31 26 31 L38 31 C43 31 46 34.5 46 38.5 C46 42.5 43 46 38 46 L25 46"
    fill="none" stroke="url(#s-grad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- Corner bracket — top right -->
  <path d="M50 14 L50 10 L54 10" fill="none" stroke="#00e676" stroke-width="1.2" stroke-linecap="square" opacity="0.7"/>

  <!-- Corner bracket — bottom left -->
  <path d="M14 50 L14 54 L10 54" fill="none" stroke="#c44dff" stroke-width="1.2" stroke-linecap="square" opacity="0.7"/>
</svg>
